<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#b6562d" />
  <meta name="description" content="家族で使うかわいい報酬管理アプリ" />
  <title>LesserPay 🐼 家庭内報酬管理</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LesserPay" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Red panda mascot (reused via SVG symbol) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="lesser-panda" viewBox="0 0 120 120">
        <image href="icons/lesser-panda-face.png" x="0" y="0" width="120" height="120" preserveAspectRatio="xMidYMid slice"/>
      </symbol>

    </defs>
  </svg>

  <div id="user-select-screen" class="user-select-screen hidden">
    <div class="user-select-card">
      <button id="user-select-close-btn" class="user-select-close-btn hidden" type="button" data-i18n-attr-aria-label="userSelect.close">✕</button>
      <svg class="user-select-mascot" width="80" height="80" aria-hidden="true"><use href="#lesser-panda"/></svg>
      <h2 class="user-select-title" data-i18n="userSelect.title"></h2>
      <p class="user-select-desc" data-i18n="userSelect.desc"></p>
      <div id="user-select-list" class="user-select-list"></div>
    </div>
  </div>

  <header class="app-header">
    <h1 class="app-title">
      <svg class="app-logo" width="36" height="36"><use href="#lesser-panda"/></svg>
      <span class="app-title-text" data-i18n="app.title"></span>
    </h1>
    <div class="header-actions">
      <button id="user-label" class="user-label hidden" type="button" data-i18n-attr-aria-label="header.currentUser"></button>
    </div>

    <div id="user-popover" class="user-popover hidden" role="menu" aria-labelledby="user-label">
      <div class="user-popover-title" data-i18n="users.switcherTitle"></div>
      <ul id="user-popover-list" class="user-popover-list"></ul>
    </div>
  </header>

  <div id="pull-indicator" class="pull-indicator" aria-hidden="true">
    <span class="pull-indicator-icon" aria-hidden="true"></span>
  </div>

  <main class="app-main">
    <section class="balance-card">
      <div class="balance-label" data-i18n="balance.label"></div>
      <div class="balance-value">
        <span class="balance-number">
          <span id="balance-amount">---</span>
          <span class="balance-unit" data-i18n="balance.unit"></span>
        </span>
      </div>
      <button id="cashout-btn" class="balance-cashout hidden" type="button" data-i18n="cashout.button"></button>
    </section>

    <section class="content-section">
      <div class="tabs" role="tablist">
        <button id="tab-tasks"   class="tab is-active" type="button" role="tab" aria-controls="panel-tasks"   data-tab="tasks">
          <span class="tab-emoji">📋</span><span class="tab-label" data-i18n="tasks.sectionTitle"></span>
          <span id="tab-tasks-badge" class="tab-badge hidden"></span>
        </button>
        <button id="tab-history" class="tab"           type="button" role="tab" aria-controls="panel-history" data-tab="history">
          <span class="tab-emoji">🐾</span><span class="tab-label" data-i18n="history.sectionTitle"></span>
        </button>
      </div>

      <div id="panel-tasks" class="tab-panel" role="tabpanel" aria-labelledby="tab-tasks">
        <div id="tasks-list" class="tasks-list">
          <div class="empty-state" data-i18n="tasks.loading"></div>
        </div>
      </div>

      <div id="panel-history" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-history">
        <div id="history-list" class="history-list">
          <div class="empty-state" data-i18n="history.loading"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="parent-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <svg class="modal-mascot" width="64" height="64"><use href="#lesser-panda"/></svg>
      <h3 class="modal-title" data-i18n="parent.title"></h3>
      <p class="modal-desc" data-i18n="parent.desc"></p>
      <input type="password" id="parent-pin" class="modal-input" inputmode="numeric" autocomplete="off" />
      <div class="modal-actions">
        <button id="parent-cancel-btn" class="btn btn-secondary" data-i18n="parent.cancel"></button>
        <button id="parent-submit-btn" class="btn btn-primary" data-i18n="parent.login"></button>
      </div>
      <div id="parent-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <svg class="modal-mascot" width="64" height="64"><use href="#lesser-panda"/></svg>
      <h3 class="modal-title" data-i18n="settings.title"></h3>
      <p class="modal-desc" data-i18n="settings.desc"></p>
      <div class="settings-list">
        <button id="settings-push-row" class="settings-row" type="button">
          <span class="settings-row-label">
            <span class="settings-row-emoji" aria-hidden="true">🔔</span>
            <span class="settings-row-text" data-i18n="settings.notifications"></span>
          </span>
          <span class="settings-toggle" id="settings-push-toggle" role="switch" aria-checked="false"><span class="settings-toggle-thumb"></span></span>
        </button>
        <button id="settings-sound-row" class="settings-row" type="button">
          <span class="settings-row-label">
            <span class="settings-row-emoji" aria-hidden="true">🔊</span>
            <span class="settings-row-text" data-i18n="settings.sound"></span>
          </span>
          <span class="settings-toggle" id="settings-sound-toggle" role="switch" aria-checked="false"><span class="settings-toggle-thumb"></span></span>
        </button>
      </div>
      <div class="modal-actions">
        <button id="settings-close-btn" class="btn btn-primary" data-i18n="settings.close"></button>
      </div>
    </div>
  </div>

  <div id="cashout-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <svg class="modal-mascot" width="64" height="64"><use href="#lesser-panda"/></svg>
      <h3 class="modal-title" data-i18n="cashout.title"></h3>
      <p class="modal-desc" data-i18n="cashout.desc"></p>
      <div id="cashout-balance" class="cashout-balance"></div>
      <input type="number" id="cashout-amount" class="modal-input" inputmode="numeric" min="1" placeholder="500" />
      <div class="modal-actions">
        <button id="cashout-cancel-btn" class="btn btn-secondary" data-i18n="cashout.cancel"></button>
        <button id="cashout-submit-btn" class="btn btn-primary" data-i18n="cashout.submit"></button>
      </div>
      <div id="cashout-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/strings.js"></script>
  <script src="js/app-i18n.js"></script>
  <script src="js/app-store.js"></script>
  <script src="js/app-utils.js"></script>
  <script src="js/app-sound.js"></script>
  <script src="js/app-controller-data.js"></script>
  <script src="js/app-controller-actions.js"></script>
  <script src="js/app-controller.js"></script>
  <script src="js/app-render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
