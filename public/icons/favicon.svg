<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景の丸 (クリーム色のお餅っぽい) -->
  <circle cx="32" cy="32" r="32" fill="#fff4e6"/>
  <!-- 耳 -->
  <ellipse cx="14" cy="20" rx="8" ry="9" fill="#b6562d"/>
  <ellipse cx="50" cy="20" rx="8" ry="9" fill="#b6562d"/>
  <ellipse cx="14" cy="22" rx="4" ry="5" fill="#fff4e6"/>
  <ellipse cx="50" cy="22" rx="4" ry="5" fill="#fff4e6"/>
  <!-- 顔 -->
  <ellipse cx="32" cy="36" rx="22" ry="20" fill="#c96a3a"/>
  <!-- 頬の白 -->
  <ellipse cx="16" cy="40" rx="9" ry="11" fill="#fff4e6"/>
  <ellipse cx="48" cy="40" rx="9" ry="11" fill="#fff4e6"/>
  <!-- 鼻筋の白 -->
  <path d="M32,16 Q24,24 27,46 Q32,52 37,46 Q40,24 32,16 Z" fill="#fff4e6"/>
  <!-- 目の周りの茶マスク -->
  <path d="M14,32 Q22,26 27,33 Q24,40 17,40 Z" fill="#8a3f1f"/>
  <path d="M50,32 Q42,26 37,33 Q40,40 47,40 Z" fill="#8a3f1f"/>
  <!-- ぷっくり頬 (ピンク) -->
  <circle cx="14" cy="44" r="3" fill="#ffb3c1" opacity="0.7"/>
  <circle cx="50" cy="44" r="3" fill="#ffb3c1" opacity="0.7"/>
  <!-- 目 (キラキラ) -->
  <circle cx="22" cy="35" r="3" fill="#1a0e07"/>
  <circle cx="42" cy="35" r="3" fill="#1a0e07"/>
  <circle cx="23" cy="34" r="1.2" fill="#fff"/>
  <circle cx="43" cy="34" r="1.2" fill="#fff"/>
  <!-- 鼻 -->
  <ellipse cx="32" cy="44" rx="2.2" ry="1.6" fill="#1a0e07"/>
  <!-- 口 (ニコ) -->
  <path d="M32,46 Q29,50 26,49 M32,46 Q35,50 38,49" stroke="#1a0e07" stroke-width="1.2" fill="none" stroke-linecap="round"/>
